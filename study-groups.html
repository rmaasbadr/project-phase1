<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Groups - Code & Coffee</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="media/logo.png" alt="Code & Coffee Logo">
            <h2>Code & Coffee</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about-us.html">About Us</a>
            <a href="contact-us.html">Contact Us</a>
            <a href="study-groups.html">Study Groups</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Find a Study Group</h1>
        <p class="page-subtitle">Fill in the form to find students with similar interests</p>

        <section class="form-box">
            <h2>Join a Study Group</h2> <!-- هذا هو الحل -->

            <form action="#" method="post">
                <label for="student-name">Your Name</label>
                <input type="text" id="student-name" name="student-name" required>

                <label for="subject">Subject / Course</label>
                <input type="text" id="subject" name="subject" placeholder="Web Development, Java, Database..." required>

                <label for="cafe">Preferred Cafe</label>
                <input type="text" id="cafe" name="cafe" placeholder="Write your preferred cafe">

                <label for="time">Preferred Time</label>
                <select id="time" name="time" required>
                    <option value="">Select time</option>
                    <option value="morning">Morning</option>
                    <option value="afternoon">Afternoon</option>
                    <option value="evening">Evening</option>
                </select>

                <button type="submit">Join Now</button>
            </form>
        </section>
    </main>

    <footer>
        <p>©️ 2026 Code & Coffee</p>
    </footer>

</body>
</html>
