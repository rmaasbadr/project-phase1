<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Code & Coffee</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="media/logo.png" alt="Code & Coffee Logo">
            <h2>Code & Coffee</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about-us.html">About Us</a>
            <a href="contact-us.html">Contact Us</a>
            <a href="study-groups.html">Study Groups</a>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Contact Us</h1>
        <p class="page-subtitle">Send us your questions or suggestions</p>

        <section class="form-box">
            <h2>Contact Form</h2> <!-- الحل هنا -->

            <form action="#" method="post">
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name" required>

                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name" required>

                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select gender</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>

                <label for="mobile">Mobile</label>
                <input type="tel" id="mobile" name="mobile" required>

                <label for="birth-date">Date of Birth</label>
                <input type="date" id="birth-date" name="birth-date" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="language">Language of Communication</label>
                <select id="language" name="language" required>
                    <option value="">Select language</option>
                    <option value="arabic">Arabic</option>
                    <option value="english">English</option>
                    <option value="french">French</option>
                </select>

                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>©️ 2026 Code & Coffee</p>
    </footer>

</body>
</html>
